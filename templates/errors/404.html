<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><title>404 — Not Found</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family:'Segoe UI',sans-serif; background:#f4f4f4; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .box { background:#fff; border-radius:12px; padding:48px 40px; text-align:center; max-width:420px; box-shadow:0 4px 20px rgba(0,0,0,.1); }
    .icon { font-size:56px; color:#1e5a9f; margin-bottom:16px; }
    h1 { font-size:22px; color:#333; margin-bottom:8px; }
    p  { color:#666; font-size:14px; margin-bottom:24px; }
    a { display:inline-block; padding:10px 24px; background:#1e5a9f; color:#fff; border-radius:6px; text-decoration:none; font-size:14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon"><i class="fas fa-search"></i></div>
    <h1>404 — Page Not Found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/"><i class="fas fa-home"></i> Go Home</a>
  </div>
</body>
</html>
