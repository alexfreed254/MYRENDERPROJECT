<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | TTTTI</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    body { background: linear-gradient(135deg, #1e5a9f 0%, #154070 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.25); }
    h2 { color: #1e5a9f; margin-bottom: 8px; }
    p  { color: #666; font-size: 14px; margin-bottom: 24px; }
    input[type=email] { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    button { width: 100%; padding: 13px; background: #1e5a9f; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .msg { background: #e8f5e9; color: #2e7d32; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 14px; }
    a { color: #1e5a9f; font-size: 13px; display: block; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Reset Password</h2>
    <p>Enter your email address and we'll send you a reset link.</p>
    {% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
    <form method="post">
      <input type="email" name="email" placeholder="your@email.com" required>
      <button type="submit">Send Reset Link</button>
    </form>
    <a href="/auth/login">← Back to Login</a>
  </div>
</body>
</html>
