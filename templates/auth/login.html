<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | TTTTI Attendance System</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #1e5a9f 0%, #154070 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.25); padding: 40px 36px; width: 100%; max-width: 420px; }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo img { height: 72px; border-radius: 50%; border: 3px solid #1e5a9f; }
    .login-logo h1 { font-size: 16px; font-weight: 700; color: #1e5a9f; margin: 10px 0 2px; }
    .login-logo p  { font-size: 12px; color: #888; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border-color .2s; }
    .form-group input:focus { outline: none; border-color: #1e5a9f; box-shadow: 0 0 0 3px rgba(30,90,159,.1); }
    .btn-login { width: 100%; padding: 13px; background: linear-gradient(135deg, #1e5a9f, #154070); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn-login:hover { opacity: .9; }
    .error-box { background: #ffebee; color: #c62828; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    .success-box { background: #e8f5e9; color: #2e7d32; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .login-footer a { color: #1e5a9f; text-decoration: none; }
    .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ LOGO_URL }}" alt="Logo">
      <h1>THIKA TECHNICAL TRAINING INSTITUTE</h1>
      <p>Attendance Management System</p>
    </div>

    {% if request.args.get('registered') %}
    <div class="success-box"><i class="fas fa-check-circle"></i> Registration successful! You can now log in.</div>
    {% endif %}

    {% if error %}
    <div class="error-box"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login">
      <div class="form-group">
        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="remember-row">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="/auth/forgot-password">Forgot password?</a>
      </div>
      <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>

    <div class="login-footer">
      New student? <a href="/student/register">Register here</a>
    </div>
  </div>
</body>
</html>
