<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; }
    .dashboard-container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; min-width: 260px; background: linear-gradient(180deg, #1e5a9f 0%, #154070 100%); color: white; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
    .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header img { height: 60px; margin-bottom: 10px; border-radius: 50%; border: 2px solid white; }
    .sidebar-header h2 { font-size: 14px; font-weight: bold; margin: 0; opacity: 0.9; }
    .sidebar-header h3 { font-size: 12px; font-weight: normal; margin: 5px 0 0; opacity: 0.7; }
    .sidebar-menu { flex: 1; padding: 20px 0; overflow-y: auto; }
    .sidebar-menu a { display: block; padding: 15px 25px; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s; border-left: 4px solid transparent; }
    .sidebar-menu a:hover { background: rgba(255,255,255,0.1); color: white; border-left-color: #ffd700; }
    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .sidebar-footer a { display: block; padding: 10px; text-align: center; background: rgba(255,0,0,0.2); color: white; text-decoration: none; border-radius: 4px; }
    .sidebar-footer a:hover { background: rgba(255,0,0,0.4); }
    .main-content { margin-left: 260px; flex: 1; min-height: 100vh; background: #f4f4f4; }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <img src="{{ LOGO_URL }}" alt="Logo">
        <h2>THIKA TECHNICAL</h2>
        <h3>TRAINING INSTITUTE</h3>
      </div>
      <div class="sidebar-menu">
        <a href="/admin/welcome">Dashboard</a>
        <a href="/admin/departments">Manage Departments</a>
        <a href="/admin/trainers">Manage Trainers</a>
        <a href="/admin/classes">Manage Classes</a>
        <a href="/admin/students">Manage Students</a>
        <a href="/admin/units">Manage Units</a>
        <a href="/admin/assign_units">Assign Units</a>
        <a href="/admin/view_attendance">View Attendance</a>
        <a href="/admin/import_data">Import Data</a>
      </div>
      <div class="sidebar-footer">
        <a href="/admin/logout">Logout</a>
      </div>
    </div>
    <div class="main-content">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
