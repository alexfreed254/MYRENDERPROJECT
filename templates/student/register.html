<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Registration | TTTTI</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box" style="max-width:480px;">
    <div class="logo"><img src="{{ LOGO_URL }}" alt="Logo"></div>
    <h1>Student Registration</h1>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/student/register">
      <input type="hidden" name="dept_id" value="{{ dept_id }}">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="fullname" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Admission Number</label>
        <input type="text" name="admission_number" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required minlength="8">
        <small style="color:#888;font-size:12px;">Min 8 characters, must include a number and a symbol (e.g. @, #, !)</small>
      </div>

      <!-- Department filter (reloads page to filter classes) -->
      <div class="form-group">
        <label>Department</label>
        <select class="form-control" onchange="window.location='/student/register?dept_id='+this.value">
          <option value="">-- Select Department --</option>
          {% for d in departments %}
            <option value="{{ d.id }}" {% if dept_id == d.id %}selected{% endif %}>{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Class</label>
        <select name="class_id" class="form-control" required>
          <option value="">-- Select Class --</option>
          {% for c in classes %}
            <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="btn btn-warning" style="width:100%;">Register</button>
    </form>

    <div class="auth-footer">
      Already registered? <a href="/student/login">Login here</a><br>
      <a href="/" style="margin-top:8px;display:inline-block;">← Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
