<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Login | TTTTI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0d2b6b 0%, #1a4a9f 50%, #0d2b6b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Card ── */
    .card {
      background: linear-gradient(180deg, #1a3a7a 0%, #152f6a 100%);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 40px 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ── Logo & title ── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-wrap img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      object-fit: cover;
      background: #fff;
    }

    .logo-wrap h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 16px;
      line-height: 1.3;
    }

    .logo-wrap p {
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      margin-top: 6px;
      font-weight: 400;
    }

    /* ── Error box ── */
    .error-box {
      background: rgba(220,38,38,0.2);
      border: 1px solid rgba(220,38,38,0.4);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .success-box {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Input fields ── */
    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .input-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 15px;
    }

    .input-wrap input {
      width: 100%;
      padding: 15px 16px 15px 44px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      transition: border-color .2s, background .2s;
      outline: none;
    }

    .input-wrap input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .input-wrap input:focus {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12);
    }

    /* ── Remember / Forgot row ── */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      font-size: 13px;
    }

    .meta-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
    }

    .meta-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #e53935;
      cursor: pointer;
    }

    .meta-row a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-style: italic;
      transition: color .2s;
    }

    .meta-row a:hover { color: #fff; }

    /* ── Login button ── */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e53935, #c62828);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter .2s, transform .1s;
      box-shadow: 0 4px 20px rgba(229,57,53,0.45);
    }

    .btn-login:hover  { filter: brightness(1.1); }
    .btn-login:active { transform: scale(0.98); }

    /* ── Footer links ── */
    .footer-links {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    .footer-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }

    .footer-links a:hover { color: #fff; }

    .footer-links .sep {
      margin: 0 10px;
      opacity: 0.4;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 22px 26px; }
      .logo-wrap img { width: 76px; height: 76px; }
      .logo-wrap h1 { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo & title -->
  <div class="logo-wrap">
    <img src="{{ LOGO_URL }}" alt="TTTTI Logo">
    <h1>Thika Technical Training Institute</h1>
    <p>Student Login</p>
  </div>

  <!-- Alerts -->
  {% if request.args.get('registered') %}
  <div class="success-box">
    <i class="fas fa-check-circle"></i> Registration successful! You can now log in.
  </div>
  {% endif %}

  {% if error %}
  <div class="error-box">
    <i class="fas fa-exclamation-circle"></i> {{ error }}
  </div>
  {% endif %}

  <!-- Form -->
  <form method="post" action="/auth/student-login">
    <div class="input-wrap">
      <i class="fas fa-id-card"></i>
      <input type="text" name="admission_number"
             placeholder="Admission Number"
             value="{{ admission_number or '' }}"
             required autocomplete="username">
    </div>

    <div class="input-wrap">
      <i class="fas fa-lock"></i>
      <input type="password" name="password"
             placeholder="Password"
             required autocomplete="current-password">
    </div>

    <div class="meta-row">
      <label>
        <input type="checkbox" name="remember"> Remember me
      </label>
      <a href="/auth/forgot-password">Forgot Password?</a>
    </div>

    <button type="submit" class="btn-login">Login</button>
  </form>

  <!-- Footer links -->
  <div class="footer-links">
    <a href="/student/register">Register</a>
    <span class="sep">|</span>
    <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>

</div>

</body>
</html>
