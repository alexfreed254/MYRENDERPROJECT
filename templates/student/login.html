<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Login | TTTTI</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="logo"><img src="{{ LOGO_URL }}" alt="Logo"></div>
    <h1>THIKA TECHNICAL TRAINING INSTITUTE</h1>
    <h2>Student Login</h2>
    {% if registered %}<div class="alert alert-success">Registration successful! Please login.</div>{% endif %}
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="auth-input-wrap">
        <span class="auth-icon">&#128100;</span>
        <input type="text" name="admission_number" placeholder="Admission Number" required autofocus>
      </div>
      <div class="auth-input-wrap">
        <span class="auth-icon">&#128274;</span>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <div class="auth-options">
        <label><input type="checkbox" name="remember"> Remember me</label>
        <a href="/forgot_password">Forgot Password?</a>
      </div>
      <button type="submit" class="btn-auth-login">Login</button>
    </form>
    <div class="auth-footer">
      <a href="/student/register">Register</a> &nbsp;|&nbsp;
      <a href="/">← Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
