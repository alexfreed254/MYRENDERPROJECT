<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | TTTTI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0d2b6b 0%, #1a4a9f 50%, #0d2b6b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: linear-gradient(180deg, #1a3a7a 0%, #152f6a 100%);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 40px 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      object-fit: cover;
      background: #fff;
    }

    .logo-wrap h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 16px;
      line-height: 1.3;
    }

    .logo-wrap p {
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      margin-top: 6px;
    }

    .success-box {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 15px;
    }

    .input-wrap input {
      width: 100%;
      padding: 15px 16px 15px 44px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      transition: border-color .2s, background .2s;
      outline: none;
    }

    .input-wrap input::placeholder { color: rgba(255,255,255,0.4); }

    .input-wrap input:focus {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12);
    }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e53935, #c62828);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter .2s, transform .1s;
      box-shadow: 0 4px 20px rgba(229,57,53,0.45);
    }

    .btn-submit:hover  { filter: brightness(1.1); }
    .btn-submit:active { transform: scale(0.98); }

    .footer-links {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
    }

    .footer-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-weight: 500;
      transition: color .2s;
    }

    .footer-links a:hover { color: #fff; }

    @media (max-width: 480px) {
      .card { padding: 32px 22px 26px; }
      .logo-wrap img { width: 76px; height: 76px; }
      .logo-wrap h1 { font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo-wrap">
    <img src="{{ LOGO_URL }}" alt="TTTTI Logo">
    <h1>Thika Technical Training Institute</h1>
    <p>Reset Password</p>
  </div>

  {% if msg %}
  <div class="success-box">
    <i class="fas fa-check-circle"></i> {{ msg }}
  </div>
  {% endif %}

  <form method="post">
    <div class="input-wrap">
      <i class="fas fa-envelope"></i>
      <input type="email" name="email" placeholder="Email Address" required autocomplete="email">
    </div>
    <button type="submit" class="btn-submit">Send Reset Link</button>
  </form>

  <div class="footer-links">
    <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>

</div>

</body>
</html>
