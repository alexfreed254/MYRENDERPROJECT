<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTTTI — Unit Attendance Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: #2176c7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Main card ── */
    .card {
      background: #2d8ae0;
      border-radius: 18px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* ── Header section (blue) ── */
    .card-header {
      padding: 36px 40px 28px;
      text-align: center;
      color: #fff;
    }

    .logo-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.6);
      overflow: hidden;
      margin: 0 auto 18px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .card-header p {
      font-size: 13px;
      opacity: 0.85;
      font-weight: 400;
    }

    /* ── Body section (white) ── */
    .card-body {
      background: #fff;
      padding: 32px 40px 28px;
    }

    .card-body h2 {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: #1a6bbf;
      margin-bottom: 24px;
    }

    /* ── Role buttons grid ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 8px;
    }

    .role-sub {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: -4px;
    }

    .role-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 22px 12px;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      cursor: pointer;
      border: none;
    }

    .role-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      filter: brightness(1.08);
    }

    .role-btn:active {
      transform: translateY(0);
    }

    .role-btn i {
      font-size: 28px;
    }

    .role-btn.admin   { background: #2d8ae0; }
    .role-btn.trainer { background: #8b2fc9; }
    .role-btn.trainee { background: #f5a623; }

    /* ── Footer ── */
    .card-footer {
      background: #f5f5f5;
      padding: 14px 40px;
      text-align: center;
      font-size: 12px;
      color: #999;
      border-top: 1px solid #eee;
    }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      .card-header { padding: 28px 24px 22px; }
      .card-body   { padding: 24px 20px 20px; }
      .card-header h1 { font-size: 16px; }
      .role-grid { gap: 10px; }
      .role-btn  { padding: 18px 8px; font-size: 13px; }
      .role-btn i { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Blue header -->
    <div class="card-header">
      <div class="logo-wrap">
        <img src="{{ LOGO_URL }}" alt="TTTTI Logo">
      </div>
      <h1>Thika Technical Training Institute</h1>
      <p>Unit Attendance Management System</p>
    </div>

    <!-- White body -->
    <div class="card-body">
      <h2>Choose Your Role</h2>

      <div class="role-grid">

        <!-- Admin (Super Admin + Dept Admin both use this) -->
        <a href="/auth/login?role=admin" class="role-btn admin">
          <i class="fas fa-user-shield"></i>
          <span>Admin</span>
          <span class="role-sub">Super &amp; Dept Admin</span>
        </a>

        <!-- Trainer -->
        <a href="/auth/trainer-login" class="role-btn trainer">
          <i class="fas fa-chalkboard-teacher"></i>
          <span>Trainer</span>
          <span class="role-sub">Lecturer Portal</span>
        </a>

        <!-- Trainee -->
        <a href="/auth/student-login" class="role-btn trainee">
          <i class="fas fa-user-graduate"></i>
          <span>Trainee</span>
          <span class="role-sub">Student Portal</span>
        </a>

      </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      &copy; 2026 Thika Technical Training Institute. All rights reserved by Lawrence K.
    </div>

  </div>

</body>
</html>
