<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TTTTI — Unit Attendance Management System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: #2176c7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Outer wrapper — same blue as body so header blends in ── */
    .card {
      background: #2176c7;
      border-radius: 22px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.28);
      overflow: hidden;
    }

    /* ── Header (blue, blends with body) ── */
    .card-header {
      padding: 44px 40px 36px;
      text-align: center;
      color: #fff;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.55);
      overflow: hidden;
      margin: 0 auto 22px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .card-header p {
      font-size: 14px;
      opacity: 0.88;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    /* ── White body ── */
    .card-body {
      background: #fff;
      border-radius: 18px 18px 0 0;
      padding: 36px 36px 32px;
    }

    .card-body h2 {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #1a6bbf;
      margin-bottom: 28px;
      letter-spacing: 0.2px;
    }

    /* ── Role buttons grid ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .role-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 30px 12px 26px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      cursor: pointer;
      border: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    .role-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
      filter: brightness(1.07);
      color: #fff;
      text-decoration: none;
    }

    .role-btn:active { transform: translateY(0); }

    .role-btn i { font-size: 32px; }

    .role-btn.admin   { background: #29a8e0; }
    .role-btn.trainer { background: #8b2fc9; }
    .role-btn.trainee { background: #f5a623; }

    /* ── Footer ── */
    .card-footer {
      background: #f7f7f7;
      padding: 14px 36px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid #eee;
    }

    /* ── Responsive ── */
    @media (max-width: 460px) {
      .card-header { padding: 32px 20px 28px; }
      .card-body   { padding: 28px 18px 24px; border-radius: 14px 14px 0 0; }
      .card-header h1 { font-size: 17px; }
      .role-grid { gap: 12px; }
      .role-btn  { padding: 22px 8px 20px; font-size: 14px; }
      .role-btn i { font-size: 26px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Blue header — blends with page background -->
    <div class="card-header">
      <div class="logo-wrap">
        <img src="{{ LOGO_URL }}" alt="TTTTI Logo">
      </div>
      <h1>Thika Technical Training Institute</h1>
      <p>Unit Attendance Management System</p>
    </div>

    <!-- White body -->
    <div class="card-body">
      <h2>Choose Your Role</h2>

      <div class="role-grid">

        <a href="/auth/login" class="role-btn admin">
          <i class="fas fa-user-shield"></i>
          <span>Admin</span>
        </a>

        <a href="/auth/trainer-login" class="role-btn trainer">
          <i class="fas fa-chalkboard-teacher"></i>
          <span>Trainer</span>
        </a>

        <a href="/auth/student-login" class="role-btn trainee">
          <i class="fas fa-user-graduate"></i>
          <span>Trainee</span>
        </a>

      </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      &copy; 2026 Thika Technical Training Institute. All rights reserved by Lawrence K.
    </div>

  </div>

</body>
</html>
